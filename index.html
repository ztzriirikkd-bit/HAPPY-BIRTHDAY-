<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 HACKER TEAM OFC 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--lamp-matte:#e8e2d9;
--lamp-shade:#f5f0e6;
--lamp-base:#d1ccc2;
--glow-color:rgba(255,214,110,0.3);
--accent-color:#00ffcc;
--on:0;
}

body{
overflow:hidden;
background:#000;
transition:0.5s;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* LOGIN */

.login-page{
position:fixed;
inset:0;
background:#121417;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
overflow:hidden;
transition:1s;
}

.login-page::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 40%,var(--glow-color),transparent 70%);
opacity:var(--on);
transition:0.5s;
pointer-events:none;
}

.container{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
flex-wrap:wrap;
z-index:2;
}

.lamp-wrapper{
position:relative;
width:280px;
height:400px;
display:flex;
justify-content:center;
}

.lamp-svg{
width:100%;
height:100%;
overflow:visible;
}

.lamp-shade{
fill:var(--lamp-shade);
transition:0.5s;
}

body[data-on="true"] .lamp-shade{
fill:#fff;
filter:drop-shadow(0 0 30px rgba(255,255,200,0.4));
}

.lamp-base{
fill:var(--lamp-base);
}

.inner-glow{
fill:#ffdb8a;
opacity:0;
transition:0.5s;
filter:blur(15px);
}

body[data-on="true"] .inner-glow{
opacity:0.6;
}

.cord-line{
stroke:#555;
stroke-width:2;
}

.cord-bead{
fill:var(--accent-color);
}

.cord-hit{
cursor:pointer;
}

/* LOGIN FORM */

.login-form{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:2.5rem;
border-radius:30px;
width:340px;
border:1px solid rgba(255,255,255,0.1);
transform:translateY(30px);
opacity:0;
pointer-events:none;
transition:0.7s;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.login-form.active{
opacity:1;
transform:translateY(0);
pointer-events:all;
}

.login-form h2{
color:#fff;
margin:0 0 1.5rem 0;
font-weight:600;
text-align:center;
font-size:28px;
text-shadow:0 0 15px #00ffcc;
}

.form-group{
margin-bottom:1.2rem;
}

.form-group label{
display:block;
color:#bbb;
font-size:14px;
margin-bottom:8px;
}

.form-group input{
width:100%;
padding:14px 18px;
background:rgba(255,255,255,0.07);
border:1px solid transparent;
border-radius:15px;
color:white;
outline:none;
transition:0.3s;
font-size:1rem;
}

.form-group input:focus{
border-color:#00ffcc;
box-shadow:0 0 15px rgba(0,255,204,0.4);
}

.login-btn{
width:100%;
padding:15px;
background:linear-gradient(45deg,#00ffcc,#00bfff);
border:none;
border-radius:15px;
font-weight:700;
color:#000;
cursor:pointer;
transition:0.3s;
margin-top:10px;
font-size:3rem;
}

.login-btn:hover{
transform:scale(1.03);
box-shadow:0 0 25px #00ffcc;
}

/* TEXT */

.fire-text{
position:absolute;
top:8%;
width:100%;
text-align:center;
z-index:5;
pointer-events:none;
}

.fire-text h1{
color:#fff;
font-size:45px;
text-shadow:0 0 25px #00ffcc;
}

.fire-text p{
color:#fff;
margin-top:10px;
font-size:18px;
}

.hidden{
opacity:0;
visibility:hidden;
pointer-events:none;
}

/* BIRTHDAY SCREEN */

.birthday-screen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
overflow:hidden;
}

.birthday-screen.show{
display:flex;
}

.birthday-screen .text{
text-align:center;
margin-top:20px;
}

.birthday-screen .text h1{
color:#fff;
font-size:55px;
text-shadow:0 0 20px #fff;
}

.birthday-screen .name{
color:#fff;
font-size:30px;
font-weight:700;
margin-top:10px;
text-shadow:0 0 15px #fff;
}

.cake{
background:#fff;
border-radius:10px;
position:absolute;
top:100px;
left:50%;
margin-left:-2.5px;
width:5px;
height:35px;
}

.cake:after,
.cake:before{
background:rgba(255,0,0,0.4);
content:"";
position:absolute;
width:100%;
height:2px;
}

.cake:after{
top:25%;
}

.cake:before{
top:45%;
}

.fuego{
border-radius:100%;
position:absolute;
top:-20px;
left:50%;
margin-left:-2.6px;
width:7px;
height:18px;
}

.fuego:nth-child(1){animation:fuego 2s infinite;}
.fuego:nth-child(2){animation:fuego 1.5s infinite;}
.fuego:nth-child(3){animation:fuego 1s infinite;}
.fuego:nth-child(4){animation:fuego 0.5s infinite;}
.fuego:nth-child(5){animation:fuego 0.2s infinite;}

@keyframes fuego{
0%,100%{
background:rgba(254,248,97,0.5);
box-shadow:0 0 40px 10px rgba(248,233,209,0.2);
transform:translateY(0) scale(1);
}

50%{
background:rgba(255,50,0,0.1);
box-shadow:0 0 40px 20px rgba(248,233,209,0.2);
transform:translateY(-20px) scale(0);
}
}

#cakeSVG{
width:250px;
height:250px;
}

</style>
</head>

<body data-on="false">

<!-- LOGIN -->
<div class="login-page" id="loginPage">

<div class="container">

<div class="lamp-wrapper">

<svg class="lamp-svg" viewBox="0 0 200 400">

<ellipse class="inner-glow" cx="100" cy="110" rx="600" ry="30"/>

<rect class="lamp-base" x="92" y="100" width="16" height="160" rx="8"/>

<rect class="lamp-base" x="60" y="250" width="80" height="12" rx="6"/>

<g class="pull-cord">

<line class="cord-line" x1="130" y1="110" x2="130" y2="180"/>

<circle class="cord-bead" cx="130" cy="190" r="6"/>

<circle class="cord-hit" cx="130" cy="190" r="25" fill="transparent"/>

</g>

<path class="lamp-shade"
d="M30 110 C 300 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z"/>

</svg>
</div>
<div class="login-form">
<h2>HACKERTEAM</h2>
<div class="form-group">
<input type="text" id="username" placeholder="Enter Username">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>
  
<button class="login-btn" onclick="login()">
LOGIN NOW
</button>

</div>

</div>

</div>

<!-- FIREWORK TITLE -->
<div class="fire-text">
<h1>🎆 FIREWORK SHOW 🎆</h1>
<p>Touch Screen For Fireworks</p>
</div>

<!-- CANVAS -->
<canvas id="canvas"></canvas>

<!-- BIRTHDAY -->
<div class="birthday-screen" id="birthdayScreen">

<div class="cake">
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
</div>

<svg id="cakeSVG" viewBox="0 0 200 200">

<circle cx="100" cy="100" r="80" fill="#fff0f5"/>

<rect x="40" y="90" width="120" height="60"
rx="15"
fill="#ff69b4"/>

<rect x="50" y="70" width="100" height="30"
rx="10"
fill="#fff"/>

<circle cx="70" cy="120" r="6" fill="#fff"/>
<circle cx="100" cy="120" r="6" fill="#fff"/>
<circle cx="130" cy="120" r="6" fill="#fff"/>

</svg>

<div class="text">
<h1>🎂 HAPPY BIRTHDAY 🎂</h1>
<p class="name">HACKER TEAM OFC</p>
</div>

</div>

<!-- SOUND -->
<audio id="fireSound" preload="auto">
<source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>

<script>

gsap.registerPlugin(Draggable);

const body = document.body;
const loginForm = document.querySelector('.login-form');
const cordBead = document.querySelector('.cord-bead');
const cordLine = document.querySelector('.cord-line');
const hitArea = document.querySelector('.cord-hit');

let isOn = false;

const clickSound = new Audio("https://assets.codepen.io/605876/click.mp3");

Draggable.create(hitArea, {

type:"y",

bounds:{minY:0,maxY:60},

onDrag:function(){

gsap.set(cordBead,{y:this.y});

gsap.set(cordLine,{
attr:{y2:180 + this.y}
});

},

onRelease:function(){

if(this.y > 30){

toggleLamp();

}

gsap.to([cordBead,hitArea],{
y:0,
duration:0.5,
ease:"back.out(2.5)"
});

gsap.to(cordLine,{
attr:{y2:180},
duration:0.5,
ease:"back.out(2.5)"
});

}

});

function toggleLamp(){

isOn = !isOn;

clickSound.play();

body.setAttribute('data-on',isOn);

document.documentElement.style.setProperty('--on',isOn ? 1 : 0);

if(isOn){

loginForm.classList.add('active');

}else{

loginForm.classList.remove('active');

}

}

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "HACKER TEAM" && pass === "1234"){

document.getElementById("loginPage").classList.add("hidden");

startFireworks();

}else{

alert("❌ Wrong Username Or Password");

}

}

function startFireworks(){

var canvas = document.getElementById("canvas");
var c = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let touchCount = 0;

let particles = [];

var fireSound = document.getElementById("fireSound");

function createFirework(x,y){

fireSound.currentTime = 0;
fireSound.play();

for(let i=0;i<100;i++){

particles.push({

x:x,
y:y,

dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,

size:Math.random()*4+2,

life:100,

color:`hsl(${Math.random()*360},100%,50%)`

});

}

}

window.addEventListener("mousedown", function(e){

touchCount++;

createFirework(e.clientX,e.clientY);

if(touchCount >= 10){

document.getElementById("birthdayScreen")
.classList.add("show");

}

});

canvas.addEventListener("touchstart", function(e){

e.preventDefault();

let touch = e.touches[0];

touchCount++;

createFirework(touch.pageX,touch.pageY);

if(touchCount >= 10){

document.getElementById("birthdayScreen")
.classList.add("show");

}

});

function animate(){

requestAnimationFrame(animate);

c.fillStyle = "rgba(0,0,0,0.15)";
c.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){

let p = particles[i];

p.x += p.dx;
p.y += p.dy;

p.life--;

c.beginPath();

c.arc(p.x,p.y,p.size,0,Math.PI*2);

c.fillStyle = p.color;

c.shadowBlur = 20;
c.shadowColor = p.color;

c.fill();

if(p.life <= 0){

particles.splice(i,1);
i--;

}

}

}

animate();

}

</script>

</body>
</html>
